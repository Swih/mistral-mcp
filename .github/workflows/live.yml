name: Live API tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:live
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
